name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test:run

  build:
    needs: lint-and-test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (no bundle, portable single exe)
        run: npm run tauri build -- --no-bundle

      - name: Rename binary for unique artifact name
        shell: bash
        run: cp "src-tauri/target/release/xd-whiteboard.exe" "./xd-whiteboard-windows-x64.exe"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: xd-whiteboard-windows-x64.exe
          path: ./xd-whiteboard-windows-x64.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ./assets/*
          body: |
            ## 小呆画板 / XD Whiteboard

            ### 使用说明
            - **Windows**: 下载 `.exe` 文件，双击即可运行，无需安装。
            - 需要系统已安装 WebView2 运行时（Windows 11 预装，Windows 10 多数已预装；若未安装可从微软官网下载）。

            ### 安全提示
            Windows 可能显示 SmartScreen 警告，因为应用尚未签名。
            解决方法：右键 exe → 属性 → 勾选"解除锁定" → 确定。
