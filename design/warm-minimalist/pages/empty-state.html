<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小呆画板 - 欢迎</title>
    <style id="theme-vars">
/* xd-whiteboard 精致简约风格 - Warm Minimalist */
/* Inspired by Excalidraw's hand-drawn aesthetic, warm paper tones, organic shapes */

:root {
  /* === Color System === */
  --background: #FAF8F5;
  --foreground: #2D2A26;
  --card: #FFFFFF;
  --card-foreground: #2D2A26;
  --popover: #FFFFFF;
  --popover-foreground: #2D2A26;
  --muted: #F0EDE8;
  --muted-foreground: #8A857D;
  --accent: #F0EDE8;
  --accent-foreground: #2D2A26;
  --border: #E5E0D8;
  --input: #E5E0D8;
  --ring: #C8B99A;

  /* Primary - warm amber/terracotta */
  --primary: #C87941;
  --primary-foreground: #FFFFFF;

  /* State colors */
  --state-success: #5B8C5A;
  --state-warning: #C9943A;
  --state-error: #C45B4A;
  --state-info: #5A7DB5;

  /* Surface depth */
  --surface-1: #FFFFFF;
  --surface-2: #F5F2ED;
  --surface-3: #EDE9E2;
  --shadow-subtle: 0 1px 2px rgba(45, 42, 38, 0.04);
  --shadow-medium: 0 4px 12px rgba(45, 42, 38, 0.06);
  --shadow-float: 0 8px 24px rgba(45, 42, 38, 0.10);

  /* === Typography === */
  --font-display: 'Caveat', cursive;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;

  /* Type scale - comfortable reading */
  --text-xs: 0.75rem;
  --text-sm: 0.8125rem;
  --text-base: 0.875rem;
  --text-lg: 1rem;
  --text-xl: 1.25rem;
  --text-2xl: 1.5rem;
  --text-3xl: 1.875rem;
  --leading-tight: 1.25;
  --leading-normal: 1.5;
  --leading-relaxed: 1.625;

  /* === Shape === */
  --radius-xs: 4px;
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-2xl: 20px;
  --radius-full: 9999px;

  /* === Spacing === */
  --space-0: 0;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* === Transitions === */
  --transition-fast: 150ms ease;
  --transition-normal: 200ms ease;
  --transition-slow: 300ms ease;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
@theme inline {
  --color-background: var(--background);
  --color-foreground: var(--foreground);
  --color-primary: var(--primary);
  --color-primary-foreground: var(--primary-foreground);
  --color-card: var(--card);
  --color-card-foreground: var(--card-foreground);
  --color-popover: var(--popover);
  --color-popover-foreground: var(--popover-foreground);
  --color-muted: var(--muted);
  --color-muted-foreground: var(--muted-foreground);
  --color-accent: var(--accent);
  --color-accent-foreground: var(--accent-foreground);
  --color-border: var(--border);
  --color-input: var(--input);
  --color-ring: var(--ring);
  --color-surface-1: var(--surface-1);
  --color-surface-2: var(--surface-2);
  --color-surface-3: var(--surface-3);
  --color-state-success: var(--state-success);
  --color-state-warning: var(--state-warning);
  --color-state-error: var(--state-error);
  --color-state-info: var(--state-info);
  --font-family-display: var(--font-display);
  --font-family-body: var(--font-body);
  --font-family-mono: var(--font-mono);
}
@layer base {
  body { background: var(--card-background); color: var(--card-foreground); }
  td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
  th { @apply whitespace-nowrap; }
}
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="h-screen flex flex-col overflow-hidden" style="background: var(--background);">

      <!-- Top Menu Bar -->
      <header class="h-10 flex items-center justify-between px-3 shrink-0 select-none" style="background: var(--surface-2); border-bottom: 1px solid var(--border);">
        <div class="flex items-center gap-1">
          <img src="../assets/whiteboard_icon_3_pencil.jpg" alt="" class="w-6 h-6 mr-1 rounded" style="object-fit: contain;" />
          <span class="text-sm font-semibold mr-3" style="font-family: var(--font-display); color: var(--primary); font-size: 1.25rem;">小呆画板</span>
          <button class="px-2.5 py-1 rounded-md text-xs transition-colors duration-150" style="color: var(--muted-foreground);">文件</button>
          <button class="px-2.5 py-1 rounded-md text-xs transition-colors duration-150" style="color: var(--muted-foreground);">视图</button>
          <button class="px-2.5 py-1 rounded-md text-xs transition-colors duration-150" style="color: var(--muted-foreground);">窗口</button>
          <button class="px-2.5 py-1 rounded-md text-xs transition-colors duration-150" style="color: var(--muted-foreground);">帮助</button>
        </div>
        <div class="flex items-center gap-2">
          <span class="text-xs" style="color: var(--muted-foreground);">100%</span>
          <div class="flex items-center ml-2 gap-0.5">
            <button class="w-7 h-7 flex items-center justify-center rounded-md transition-colors duration-150" style="color: var(--muted-foreground);" aria-label="最小化">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="2" y1="10" x2="10" y2="10"/></svg>
            </button>
            <button class="w-7 h-7 flex items-center justify-center rounded-md transition-colors duration-150" style="color: var(--muted-foreground);" aria-label="最大化">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="2" width="8" height="8" rx="1"/></svg>
            </button>
            <button class="w-7 h-7 flex items-center justify-center rounded-md transition-colors duration-150" style="color: var(--muted-foreground);" aria-label="关闭">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="3" y1="3" x2="9" y2="9"/><line x1="9" y1="3" x2="3" y2="9"/></svg>
            </button>
          </div>
        </div>
      </header>

      <!-- Main body -->
      <div class="flex flex-1 overflow-hidden">

        <!-- Left Sidebar (empty) -->
        <aside class="w-[280px] flex flex-col shrink-0" style="background: var(--surface-1); border-right: 1px solid var(--border);">
          <!-- Hand-drawn left border decoration -->
          <div class="shrink-0" style="position: absolute; left: 280px; top: 40px; bottom: 0; width: 3px; pointer-events: none;">
            <svg width="3" height="100%" viewBox="0 0 3 600" preserveAspectRatio="none" style="opacity: 0.12;">
              <path d="M1.5,0 C0.5,50 2.5,100 1,150 C0,200 2.5,250 1.5,300 C0.5,350 2,400 1,450 C2,500 0.5,550 1.5,600" fill="none" stroke="var(--primary)" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>

          <!-- Workspace selector (no workspace selected) -->
          <div class="px-3 py-2.5 flex items-center gap-2" style="border-bottom: 1px solid var(--border);">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted-foreground)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="transform: rotate(-2deg);">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
            <span class="text-xs truncate flex-1" style="color: var(--muted-foreground);">未选择工作空间</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--muted-foreground)" stroke-width="2" stroke-linecap="round"><path d="m6 9 6 6 6-6"/></svg>
          </div>

          <!-- File tree header -->
          <div class="px-3 py-2 flex items-center justify-between">
            <span class="text-xs font-medium uppercase tracking-wider" style="color: var(--muted-foreground);">文件</span>
          </div>

          <!-- Empty state in sidebar -->
          <div class="flex-1 flex items-center justify-center px-6">
            <div class="text-center">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--border)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mx-auto mb-2">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
              </svg>
              <p class="text-xs" style="color: var(--muted-foreground);">选择工作空间后<br/>文件将在此显示</p>
            </div>
          </div>
        </aside>

        <!-- Main Canvas Area (Welcome screen) -->
        <section class="flex-1 flex items-center justify-center" style="background: var(--surface-2);">
          <div class="text-center max-w-sm px-6">
            <!-- CSS-drawn illustration: a sketchbook with a pencil -->
            <div class="mx-auto mb-8" style="width: 120px; height: 120px;">
              <svg width="120" height="120" viewBox="0 0 120 120" fill="none">
                <!-- Notebook -->
                <rect x="20" y="15" width="65" height="85" rx="6" fill="var(--card)" stroke="var(--foreground)" stroke-width="1.5" opacity="0.8" style="transform: rotate(-2deg);"/>
                <!-- Notebook lines -->
                <line x1="30" y1="35" x2="75" y2="35" stroke="var(--border)" stroke-width="1" stroke-linecap="round"/>
                <line x1="30" y1="47" x2="65" y2="47" stroke="var(--border)" stroke-width="1" stroke-linecap="round"/>
                <line x1="30" y1="59" x2="70" y2="59" stroke="var(--border)" stroke-width="1" stroke-linecap="round"/>
                <line x1="30" y1="71" x2="55" y2="71" stroke="var(--border)" stroke-width="1" stroke-linecap="round"/>
                <!-- Pencil -->
                <g style="transform: rotate(25deg) translate(55px, -30px);">
                  <rect x="0" y="0" width="6" height="45" rx="1" fill="var(--primary)" opacity="0.8"/>
                  <polygon points="0,45 6,45 3,52" fill="var(--foreground)" opacity="0.6"/>
                  <rect x="0" y="0" width="6" height="8" rx="1" fill="var(--foreground)" opacity="0.3"/>
                </g>
                <!-- Sparkles -->
                <circle cx="92" cy="28" r="2" fill="var(--primary)" opacity="0.4"/>
                <circle cx="100" cy="45" r="1.5" fill="var(--primary)" opacity="0.3"/>
                <circle cx="88" cy="55" r="1" fill="var(--primary)" opacity="0.25"/>
              </svg>
            </div>

            <!-- Title -->
            <h1 class="text-2xl font-semibold mb-2" style="font-family: var(--font-display); color: var(--foreground); font-size: 2rem; text-wrap: balance; word-break: keep-all;">
              欢迎使用小呆画板
            </h1>
            <p class="text-sm mb-8" style="color: var(--muted-foreground); line-height: 1.6;">
              选择一个本地文件夹作为工作空间，<br/>开始你的创意绘制之旅
            </p>

            <!-- Primary CTA -->
            <button class="inline-flex items-center gap-2 px-6 py-2.5 rounded-lg text-sm font-semibold transition-all duration-150 hover:translate-y-[-1px] active:translate-y-0" style="background: var(--primary); color: var(--primary-foreground);" data-dom-id="cta-select-workspace">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
              </svg>
              选择工作空间
            </button>

            <!-- Shortcut hints -->
            <div class="mt-10 pt-6" style="border-top: 1px solid var(--border);">
              <p class="text-xs uppercase tracking-wider font-medium mb-3" style="color: var(--muted-foreground);">快捷键</p>
              <div class="flex items-center justify-center gap-6 text-xs" style="color: var(--muted-foreground);">
                <div class="flex items-center gap-1.5">
                  <kbd class="inline-flex items-center px-1.5 py-0.5 rounded text-xs font-mono" style="background: var(--surface-3); border: 1px solid var(--border);">Ctrl+N</kbd>
                  <span>新建</span>
                </div>
                <div class="flex items-center gap-1.5">
                  <kbd class="inline-flex items-center px-1.5 py-0.5 rounded text-xs font-mono" style="background: var(--surface-3); border: 1px solid var(--border);">Ctrl+S</kbd>
                  <span>保存</span>
                </div>
                <div class="flex items-center gap-1.5">
                  <kbd class="inline-flex items-center px-1.5 py-0.5 rounded text-xs font-mono" style="background: var(--surface-3); border: 1px solid var(--border);">Ctrl+Z</kbd>
                  <span>撤销</span>
                </div>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
