<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小呆画板 - 编辑器</title>
    <style id="theme-vars">
/* xd-whiteboard 精致简约风格 - Warm Minimalist */
/* Inspired by Excalidraw's hand-drawn aesthetic, warm paper tones, organic shapes */

:root {
  /* === Color System === */
  --background: #FAF8F5;
  --foreground: #2D2A26;
  --card: #FFFFFF;
  --card-foreground: #2D2A26;
  --popover: #FFFFFF;
  --popover-foreground: #2D2A26;
  --muted: #F0EDE8;
  --muted-foreground: #8A857D;
  --accent: #F0EDE8;
  --accent-foreground: #2D2A26;
  --border: #E5E0D8;
  --input: #E5E0D8;
  --ring: #C8B99A;

  /* Primary - warm amber/terracotta */
  --primary: #C87941;
  --primary-foreground: #FFFFFF;

  /* State colors */
  --state-success: #5B8C5A;
  --state-warning: #C9943A;
  --state-error: #C45B4A;
  --state-info: #5A7DB5;

  /* Surface depth */
  --surface-1: #FFFFFF;
  --surface-2: #F5F2ED;
  --surface-3: #EDE9E2;
  --shadow-subtle: 0 1px 2px rgba(45, 42, 38, 0.04);
  --shadow-medium: 0 4px 12px rgba(45, 42, 38, 0.06);
  --shadow-float: 0 8px 24px rgba(45, 42, 38, 0.10);

  /* === Typography === */
  --font-display: 'Caveat', cursive;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;

  /* Type scale - comfortable reading */
  --text-xs: 0.75rem;
  --text-sm: 0.8125rem;
  --text-base: 0.875rem;
  --text-lg: 1rem;
  --text-xl: 1.25rem;
  --text-2xl: 1.5rem;
  --text-3xl: 1.875rem;
  --leading-tight: 1.25;
  --leading-normal: 1.5;
  --leading-relaxed: 1.625;

  /* === Shape === */
  --radius-xs: 4px;
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-2xl: 20px;
  --radius-full: 9999px;

  /* === Spacing === */
  --space-0: 0;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* === Transitions === */
  --transition-fast: 150ms ease;
  --transition-normal: 200ms ease;
  --transition-slow: 300ms ease;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
@theme inline {
  --color-background: var(--background);
  --color-foreground: var(--foreground);
  --color-primary: var(--primary);
  --color-primary-foreground: var(--primary-foreground);
  --color-card: var(--card);
  --color-card-foreground: var(--card-foreground);
  --color-popover: var(--popover);
  --color-popover-foreground: var(--popover-foreground);
  --color-muted: var(--muted);
  --color-muted-foreground: var(--muted-foreground);
  --color-accent: var(--accent);
  --color-accent-foreground: var(--accent-foreground);
  --color-border: var(--border);
  --color-input: var(--input);
  --color-ring: var(--ring);
  --color-surface-1: var(--surface-1);
  --color-surface-2: var(--surface-2);
  --color-surface-3: var(--surface-3);
  --color-state-success: var(--state-success);
  --color-state-warning: var(--state-warning);
  --color-state-error: var(--state-error);
  --color-state-info: var(--state-info);
  --font-family-display: var(--font-display);
  --font-family-body: var(--font-body);
  --font-family-mono: var(--font-mono);
}
@layer base {
  body { background: var(--card-background); color: var(--card-foreground); }
  td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
  th { @apply whitespace-nowrap; }
}
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="h-screen flex flex-col overflow-hidden" style="background: var(--background);">

      <!-- Top Menu Bar -->
      <header class="h-10 flex items-center justify-between px-3 shrink-0 select-none" style="background: var(--surface-2); border-bottom: 1px solid var(--border);">
        <!-- Left: App icon + menus -->
        <div class="flex items-center gap-1">
          <img src="../assets/whiteboard_icon_3_pencil.jpg" alt="" class="w-6 h-6 mr-1 rounded" style="object-fit: contain;" />
          <span class="text-sm font-semibold mr-3" style="font-family: var(--font-display); color: var(--primary); font-size: 1.25rem;">小呆画板</span>

          <!-- File menu (open) -->
          <div class="relative">
            <button class="px-2.5 py-1 rounded-md text-xs font-medium transition-colors duration-150" style="background: var(--surface-3); color: var(--foreground);">文件</button>
          </div>
          <button class="px-2.5 py-1 rounded-md text-xs transition-colors duration-150" style="color: var(--muted-foreground);">视图</button>
          <button class="px-2.5 py-1 rounded-md text-xs transition-colors duration-150" style="color: var(--muted-foreground);">窗口</button>
          <button class="px-2.5 py-1 rounded-md text-xs transition-colors duration-150" style="color: var(--muted-foreground);">帮助</button>
        </div>

        <!-- Right: zoom + save status + window controls -->
        <div class="flex items-center gap-2">
          <span class="text-xs tabular-nums" style="color: var(--muted-foreground);">100%</span>
          <span class="text-xs" style="color: var(--state-success);">已保存</span>
          <div class="flex items-center ml-2 gap-0.5">
            <button class="w-7 h-7 flex items-center justify-center rounded-md transition-colors duration-150" style="color: var(--muted-foreground);" aria-label="最小化">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="2" y1="10" x2="10" y2="10"/></svg>
            </button>
            <button class="w-7 h-7 flex items-center justify-center rounded-md transition-colors duration-150" style="color: var(--muted-foreground);" aria-label="最大化">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="2" width="8" height="8" rx="1"/></svg>
            </button>
            <button class="w-7 h-7 flex items-center justify-center rounded-md transition-colors duration-150" style="color: var(--muted-foreground);" aria-label="关闭">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="3" y1="3" x2="9" y2="9"/><line x1="9" y1="3" x2="3" y2="9"/></svg>
            </button>
          </div>
        </div>
      </header>

      <!-- File dropdown (open state) -->
      <div class="absolute top-10 left-[104px] z-50 py-1 rounded-lg" style="background: var(--card); border: 1px solid var(--border); box-shadow: var(--shadow-float); min-width: 180px;">
        <button class="w-full flex items-center gap-3 px-3 py-1.5 text-xs text-left transition-colors duration-150" style="color: var(--foreground);">
          <span class="w-4 text-center" style="color: var(--muted-foreground);">+</span> 新建文件
        </button>
        <button class="w-full flex items-center gap-3 px-3 py-1.5 text-xs text-left transition-colors duration-150" style="color: var(--foreground);">
          <span class="w-4 text-center" style="color: var(--muted-foreground);">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </span> 打开文件
        </button>
        <div class="mx-2 my-1" style="border-top: 1px solid var(--border);"></div>
        <button class="w-full flex items-center gap-3 px-3 py-1.5 text-xs text-left transition-colors duration-150" style="color: var(--foreground);">
          <span class="w-4 text-center" style="color: var(--muted-foreground);">S</span> 保存
          <span class="ml-auto text-xs" style="color: var(--muted-foreground);">Ctrl+S</span>
        </button>
        <button class="w-full flex items-center gap-3 px-3 py-1.5 text-xs text-left transition-colors duration-150" style="color: var(--foreground);">
          <span class="w-4 text-center" style="color: var(--muted-foreground);">E</span> 另存为
          <span class="ml-auto text-xs" style="color: var(--muted-foreground);">Ctrl+Shift+S</span>
        </button>
        <div class="mx-2 my-1" style="border-top: 1px solid var(--border);"></div>
        <button class="w-full flex items-center gap-3 px-3 py-1.5 text-xs text-left transition-colors duration-150" style="color: var(--state-error);">
          <span class="w-4 text-center">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
          </span> 删除
        </button>
      </div>

      <!-- Main body: sidebar + canvas -->
      <div class="flex flex-1 overflow-hidden">

        <!-- Left Sidebar -->
        <aside class="w-[280px] flex flex-col shrink-0" style="background: var(--surface-1); border-right: 1px solid var(--border);">
          <!-- Hand-drawn left border decoration -->
          <div class="shrink-0" style="position: absolute; left: 280px; top: 40px; bottom: 0; width: 3px; pointer-events: none;">
            <svg width="3" height="100%" viewBox="0 0 3 600" preserveAspectRatio="none" style="opacity: 0.12;">
              <path d="M1.5,0 C0.5,50 2.5,100 1,150 C0,200 2.5,250 1.5,300 C0.5,350 2,400 1,450 C2,500 0.5,550 1.5,600" fill="none" stroke="var(--primary)" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>

          <!-- Workspace selector -->
          <div class="px-3 py-2.5 flex items-center gap-2" style="border-bottom: 1px solid var(--border);">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="transform: rotate(-2deg);">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
            <span class="text-xs truncate flex-1" style="color: var(--muted-foreground);">~/Documents/我的画板</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--muted-foreground)" stroke-width="2" stroke-linecap="round"><path d="m6 9 6 6 6-6"/></svg>
          </div>

          <!-- File tree header -->
          <div class="px-3 py-2 flex items-center justify-between">
            <span class="text-xs font-medium uppercase tracking-wider" style="color: var(--muted-foreground);">文件</span>
            <div class="flex items-center gap-1">
              <button class="w-5 h-5 flex items-center justify-center rounded transition-colors duration-150" style="color: var(--muted-foreground);" aria-label="新建文件" title="新建文件">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
              <button class="w-5 h-5 flex items-center justify-center rounded transition-colors duration-150" style="color: var(--muted-foreground);" aria-label="新建文件夹" title="新建文件夹">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
              </button>
            </div>
          </div>

          <!-- File tree -->
          <nav class="flex-1 overflow-y-auto px-1.5 pb-3 no-scrollbar" aria-label="文件列表">
            <!-- Folder: 项目文档 (expanded) -->
            <div class="mb-0.5">
              <div class="flex items-center gap-1.5 px-2 py-1 rounded-md text-xs cursor-pointer transition-colors duration-150" style="color: var(--foreground);">
                <!-- Folder icon (sketched) -->
                <svg width="14" height="14" viewBox="0 0 24 24" fill="var(--primary)" stroke="none" style="opacity: 0.7; transform: rotate(-1deg);">
                  <path d="M3 7V17C3 17.5523 3.44772 18 4 18H20C20.5523 18 21 17.5523 21 17V9C21 8.44772 20.5523 8 20 8H12L10 6H4C3.44772 6 3 6.44772 3 7Z"/>
                </svg>
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--muted-foreground)" stroke-width="2.5" stroke-linecap="round"><path d="m6 9 6 6 6-6"/></svg>
                <span class="font-medium">项目文档</span>
              </div>
              <!-- Children -->
              <div class="ml-4 mt-0.5 space-y-px">
                <!-- File: selected -->
                <div class="flex items-center gap-2 px-2 py-1 rounded-md text-xs cursor-pointer" style="background: var(--muted); color: var(--foreground);">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" style="transform: rotate(-0.5deg);"/>
                    <polyline points="14 2 14 8 20 8"/>
                  </svg>
                  <span class="truncate font-medium">产品架构图.excalidraw</span>
                </div>
                <!-- File: modified (red dot) -->
                <div class="flex items-center gap-2 px-2 py-1 rounded-md text-xs cursor-pointer transition-colors duration-150" style="color: var(--foreground);">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted-foreground)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                    <polyline points="14 2 14 8 20 8"/>
                  </svg>
                  <span class="truncate">用户流程.excalidraw</span>
                  <span class="w-1.5 h-1.5 rounded-full shrink-0 ml-auto" style="background: var(--state-error);"></span>
                </div>
                <!-- File -->
                <div class="flex items-center gap-2 px-2 py-1 rounded-md text-xs cursor-pointer transition-colors duration-150" style="color: var(--foreground);">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted-foreground)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                    <polyline points="14 2 14 8 20 8"/>
                  </svg>
                  <span class="truncate">会议笔记.excalidraw</span>
                </div>
              </div>
            </div>

            <!-- Folder: 设计稿 (expanded) -->
            <div class="mb-0.5">
              <div class="flex items-center gap-1.5 px-2 py-1 rounded-md text-xs cursor-pointer transition-colors duration-150" style="color: var(--foreground);">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="var(--primary)" stroke="none" style="opacity: 0.7; transform: rotate(0.5deg);">
                  <path d="M3 7V17C3 17.5523 3.44772 18 4 18H20C20.5523 18 21 17.5523 21 17V9C21 8.44772 20.5523 8 20 8H12L10 6H4C3.44772 6 3 6.44772 3 7Z"/>
                </svg>
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--muted-foreground)" stroke-width="2.5" stroke-linecap="round"><path d="m6 9 6 6 6-6"/></svg>
                <span class="font-medium">设计稿</span>
              </div>
              <div class="ml-4 mt-0.5 space-y-px">
                <div class="flex items-center gap-2 px-2 py-1 rounded-md text-xs cursor-pointer transition-colors duration-150" style="color: var(--foreground);">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted-foreground)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                    <polyline points="14 2 14 8 20 8"/>
                  </svg>
                  <span class="truncate">首页原型.excalidraw</span>
                </div>
                <div class="flex items-center gap-2 px-2 py-1 rounded-md text-xs cursor-pointer transition-colors duration-150" style="color: var(--foreground);">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted-foreground)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                    <polyline points="14 2 14 8 20 8"/>
                  </svg>
                  <span class="truncate">交互设计.excalidraw</span>
                </div>
              </div>
            </div>

            <!-- Root file -->
            <div class="mb-0.5 ml-0">
              <div class="flex items-center gap-2 px-2 py-1 rounded-md text-xs cursor-pointer transition-colors duration-150" style="color: var(--foreground);">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted-foreground)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                  <polyline points="14 2 14 8 20 8"/>
                </svg>
                <span class="truncate">项目规划.excalidraw</span>
              </div>
            </div>
          </nav>
        </aside>

        <!-- Main Canvas Area -->
        <section class="flex-1 relative overflow-hidden" style="background: var(--surface-2);">
          <!-- Canvas content (Excalidraw placeholder) -->
          <div class="absolute inset-0 flex items-center justify-center" style="background: repeating-conic-gradient(var(--border) 0% 25%, transparent 0% 50%) 50%/24px 24px; opacity: 0.3;">
          </div>

          <!-- Simulated Excalidraw content -->
          <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
            <!-- Hand-drawn style rectangle -->
            <svg width="320" height="200" viewBox="0 0 320 200" fill="none" class="opacity-80">
              <!-- Main container box (rough/hand-drawn) -->
              <rect x="60" y="20" width="200" height="160" rx="8" stroke="var(--foreground)" stroke-width="1.8" fill="var(--card)" style="transform: rotate(-0.3deg);"/>
              <!-- Header bar -->
              <rect x="60" y="20" width="200" height="32" rx="8" fill="var(--muted)" stroke="var(--foreground)" stroke-width="1.5" style="transform: rotate(-0.3deg);"/>
              <rect x="60" y="42" width="200" height="10" fill="var(--muted)" style="transform: rotate(-0.3deg);"/>
              <!-- Header dots -->
              <circle cx="76" cy="36" r="4" fill="var(--state-error)" opacity="0.7"/>
              <circle cx="88" cy="36" r="4" fill="var(--state-warning)" opacity="0.7"/>
              <circle cx="100" cy="36" r="4" fill="var(--state-success)" opacity="0.7"/>
              <!-- Text lines -->
              <rect x="76" y="68" width="120" height="6" rx="3" fill="var(--foreground)" opacity="0.15" style="transform: rotate(-0.2deg);"/>
              <rect x="76" y="84" width="80" height="6" rx="3" fill="var(--foreground)" opacity="0.10" style="transform: rotate(0.3deg);"/>
              <!-- Button mock -->
              <rect x="76" y="108" width="60" height="22" rx="6" fill="var(--primary)" opacity="0.8"/>
              <!-- Arrow connecting -->
              <line x1="270" y1="100" x2="280" y2="100" stroke="var(--primary)" stroke-width="1.8" stroke-linecap="round"/>
              <!-- Second box -->
              <rect x="280" y="40" width="30" height="120" rx="6" stroke="var(--foreground)" stroke-width="1.5" fill="var(--card)" style="transform: rotate(0.5deg);"/>
              <rect x="286" y="55" width="18" height="4" rx="2" fill="var(--foreground)" opacity="0.1"/>
              <rect x="286" y="65" width="18" height="4" rx="2" fill="var(--foreground)" opacity="0.1"/>
              <rect x="286" y="75" width="18" height="4" rx="2" fill="var(--foreground)" opacity="0.1"/>
              <rect x="286" y="85" width="18" height="4" rx="2" fill="var(--foreground)" opacity="0.1"/>
              <!-- Label -->
              <text x="160" y="168" text-anchor="middle" font-family="var(--font-display)" font-size="16" fill="var(--muted-foreground)">产品架构图</text>
            </svg>
          </div>

          <!-- Canvas bottom toolbar -->
          <div class="absolute bottom-3 left-1/2 -translate-x-1/2 flex items-center gap-1 px-2 py-1 rounded-lg" style="background: var(--card); border: 1px solid var(--border); box-shadow: var(--shadow-medium);">
            <button class="w-7 h-7 flex items-center justify-center rounded-md transition-colors duration-150" style="color: var(--muted-foreground);" title="选择" aria-label="选择工具">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>
            </button>
            <button class="w-7 h-7 flex items-center justify-center rounded-md transition-colors duration-150" style="color: var(--primary); background: var(--muted);" title="画笔" aria-label="画笔工具">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
            </button>
